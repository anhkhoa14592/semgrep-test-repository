rules:
- id: kafka-tainted-sql-string
  languages: [go]
  message: >-
    Dữ liệu lấy trực tiếp từ Kafka message (Key/Value/Headers) được dùng để
    dựng câu lệnh SQL thủ công (nối chuỗi hoặc fmt.Sprintf) trước khi thực
    thi qua db.Exec/db.Query/db.QueryRow. Message queue không mặc định là
    nguồn dữ liệu đáng tin cậy - nếu producer bị compromise, hoặc chỉ đơn
    giản forward input người dùng chưa validate lên topic, đây là SQL
    Injection (CWE-89). Khắc phục bằng prepared statement / bind parameter,
    ví dụ: `db.Exec("UPDATE orders SET status = ? WHERE order_id = ?", status, orderID)`.
  options:
    interfile: true
  metadata:
    cwe:
    - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
    owasp:
    - A03:2021 - Injection
    category: security
    technology:
    - go
    - kafka
    confidence: HIGH
    likelihood: HIGH
    impact: HIGH
    subcategory:
    - vuln
    references:
    - https://golang.org/doc/database/sql-injection
    - https://pkg.go.dev/github.com/segmentio/kafka-go#Message
    interfile: true
  mode: taint
  severity: ERROR
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: |
          ($MSG : kafka.Message).$FIELD
      - pattern: |
          ($MSG : *kafka.Message).$FIELD
    - metavariable-regex:
        metavariable: $FIELD
        regex: ^(Value|Key|Headers)$
  pattern-sinks:
  - patterns:
    - pattern-either:
      - patterns:
        - pattern-either:
          - pattern: |
              "$SQLSTR" + ...
          - patterns:
            - pattern-inside: |
                $VAR = "$SQLSTR";
                ...
            - pattern: $VAR += ...
          - patterns:
            - pattern-inside: |
                var $SB strings.Builder
                ...
            - pattern-inside: |
                $SB.WriteString("$SQLSTR")
                ...
                $SB.String(...)
            - pattern: |
                $SB.WriteString(...)
        - metavariable-regex:
            metavariable: $SQLSTR
            regex: (?i)(select|delete|insert|create|update|alter|drop).*
      - patterns:
        - pattern-either:
          - pattern: fmt.Fprintf($F, "$SQLSTR", ...)
          - pattern: fmt.Sprintf("$SQLSTR", ...)
          - pattern: fmt.Printf("$SQLSTR", ...)
        - metavariable-regex:
            metavariable: $SQLSTR
            regex: \s*(?i)(select|delete|insert|create|update|alter|drop)\b.*%(v|s|q).*
  pattern-sanitizers:
  - pattern-either:
    - pattern: strconv.Atoi(...)
    - pattern: |
        ($X: bool)
